name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore zbrowser-release.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias zbrowser -storepass zbrowser123 -keypass zbrowser123 \
          -dname "CN=ZBrowser, OU=Development, O=ZBrowser, L=Unknown, ST=Unknown, C=US"

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_FILE: zbrowser-release.jks
        KEYSTORE_PASSWORD: zbrowser123
        KEY_ALIAS: zbrowser
        KEY_PASSWORD: zbrowser123

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ZBrowser-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: ZBrowser-release
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v4.1.${{ github.run_number }}
        name: ZBrowser v4.1.${{ github.run_number }}
        body: |
          ## ZBrowser v4.1 - Release Build
          
          Built from commit: ${{ github.sha }}
          
          ### Features
          - Multi-tab browsing with smooth tab switching
          - Built-in ad blocker with CSS injection
          - Download manager with notifications
          - Bookmark & history support (Room DB)
          - Bottom tab bar on swipe gesture
          - Desktop mode toggle
          - Find in page
          - Popup blocker
          - SSL certificate handling
          
          ### Downloads
          - **ZBrowser-debug.apk** - Debug build for testing
          - **ZBrowser-release.apk** - Signed release build
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
